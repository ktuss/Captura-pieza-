<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pieza Cabeza</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>

<body>

<!-- FONDO ESTRELLAS -->
<canvas id="spaceCanvas"></canvas>

<!-- INTRO -->
<div id="introAnimation">
  <div class="puzzle-intro">
    <div class="piece p1"></div>
    <div class="piece p2"></div>
    <div class="piece p3"></div>
    <div class="piece p4"></div>
    <div class="piece p5"></div>
  </div>
</div>

<!-- INICIO -->
<div id="homeScreen" class="screen active">
  <h1 class="logo pulsing">PIEZA</h1>
  <h1 class="logo pieza">CABEZA</h1>
  <button class="btn-enter" onclick="startCamera()">ENTRAR</button>
</div>

<!-- CAMARA -->
<div id="cameraScreen" class="screen">
  <video id="video" autoplay playsinline></video>
  <button class="btn-enter" onclick="takePhoto()">TOMAR FOTO</button>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen">

  <div id="board"></div>

  <p id="timer">1:40</p>

  <div class="controls">
    <button onclick="restartCamera()">NUEVA FOTO</button>
    <button onclick="resetGame()">REINICIAR</button>
    <button onclick="clearHistory()">BORRAR DATOS</button>
  </div>

  <div id="overlayMessage"></div>

</div>

<!-- HISTORIAL -->
<div id="historyTable"></div>

<script src="script.js"></script>

<!-- SCRIPT FONDO ESTRELLAS -->
<script>
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let stars = [];
for(let i=0;i<250;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5 + 0.5,
    d: Math.random()*0.5
  });
}

function animateStars(){
  ctx.fillStyle = 'black';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#fff';
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    s.y += s.d;
    if(s.y > canvas.height) s.y = 0;
  });
  requestAnimationFrame(animateStars);
}
animateStars();
</script>

</body>
      </html>
