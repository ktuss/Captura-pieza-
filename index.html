<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Foto Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INICIO -->
<div id="home" class="screen active">
  <h1 class="title">FOTO PUZZLE</h1>
  <div class="lens"></div>
  <button class="btn-glow" onclick="startCamera()">Entrar</button>
</div>

<!-- CAMARA -->
<div id="cameraScreen" class="screen">
  <video id="video" autoplay playsinline></video>
  <button onclick="takePhoto()">Tomar Foto</button>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen">
  <h2 id="timer">Tiempo: 0:00</h2>
  <div id="board"></div>
  <button onclick="restart()">Nueva Foto</button>
</div>

<script src="script.js"></script>
</body>
</html>
