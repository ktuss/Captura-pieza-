<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Puzzle Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 ANIMACIÓN INICIAL -->
<div id="introAnimation">
  <div class="puzzle-intro">
    <div class="piece p1"></div>
    <div class="piece p2"></div>
    <div class="piece p3"></div>
    <div class="piece p4"></div>
    <div class="piece p5"></div>
  </div>
</div>

<!-- 🏠 PANTALLA INICIO -->
<div id="homeScreen" class="screen">

  <h1 class="logo">PUZZLE GAME</h1>

  <div class="pieza">🧩 PIEZA</div>
  <div class="pieza">🧠 CABEZA</div>

  <button class="btn-enter" onclick="startGame()">ENTRAR</button>

</div>

<!-- 🎮 JUEGO -->
<div id="gameScreen" class="screen">

  <h2>Arma el puzzle</h2>

  <div id="board"></div>

  <p id="timer">Tiempo: 0s</p>

</div>

<!-- 🏆 RESULTADO / RANKING -->
<div id="resultScreen" class="screen">

  <h2>🏆 RESULTADOS</h2>

  <div id="timesTable"></div>

  <button onclick="goHome()">Volver</button>

</div>

<script src="script.js"></script>

</body>
</html>
