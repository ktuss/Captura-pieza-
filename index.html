<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INICIO -->
<div id="homeScreen" class="screen active">
  <h1 class="title">📸 FOTO JUEGO</h1>
  <button class="btn-main" onclick="startCamera()">ENTRAR</button>
</div>

<!-- CAMARA -->
<div id="cameraScreen" class="screen">
  <video id="video" autoplay></video>
  <button class="btn-main" onclick="takePhoto()">TOMAR FOTO</button>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen">
  <div id="timer">1:40</div>

  <div id="board"></div>

  <div id="overlayMessage"></div>

  <div class="controls">
    <button onclick="restart()" class="btn-led">📸 Nueva Foto</button>
    <button onclick="resetGame()" class="btn-led">🔄 Reiniciar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
