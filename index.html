<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Foto Puzzle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INICIO -->
<div id="home" class="screen active">
  <h1 class="title">FOTO PUZZLE</h1>
  <div class="lens"></div>
  <button class="btn-glow" onclick="startCamera()">Entrar</button>
</div>

<!-- CAMARA -->
<div id="cameraScreen" class="screen">
  <video id="video" autoplay playsinline></video>
  <button onclick="takePhoto()">Tomar Foto</button>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen game-layout">
  
  <div class="top-bar">
    <h2 id="timer">01:40</h2>
  </div>

  <div id="board"></div>

  <div class="bottom-bar">
    <button onclick="restart()">Nueva Foto</button>
    <button onclick="resetGame()">Reiniciar</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
