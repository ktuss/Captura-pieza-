<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <title>Pieza-Cabeza</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="homeScreen" class="screen active">
  <h1 class="logo">
    PIEZA-
    <span class="pieza">CABEZA</span>
  </h1>
  <button class="btn-enter" onclick="startCamera()">ENTRAR</button>
</div>

<div id="cameraScreen" class="screen">
  <video id="video" autoplay></video>
  <button class="btn-enter big" onclick="takePhoto()">TOMAR FOTO</button>
</div>

<div id="gameScreen" class="screen">

  <div id="timer">1:40</div>

  <div class="board-wrapper">
    <div id="board"></div>
    <div id="overlayMessage"></div>
  </div>

  <!-- RANKING -->
  <div id="ranking"></div>

  <div class="controls">
    <button onclick="restart()">NUEVA</button>
    <button onclick="resetGame()">REINICIAR</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
