<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Foto Puzzle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TIPOGRAFIA BOMBING -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INICIO -->
<div id="home" class="screen active">
  <h1 class="title">FOTO PUZZLE</h1>
  <button class="btn-glow big" onclick="startCamera()">ENTRAR</button>
</div>

<!-- CAMARA -->
<div id="cameraScreen" class="screen">
  <video id="video" autoplay playsinline></video>
  <button class="btn-glow big" onclick="takePhoto()">📸 TOMAR FOTO</button>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen game-layout">

  <h2 id="timer">01:40</h2>

  <div class="board-wrapper">
    <div id="board"></div>
    <div id="overlayMessage"></div>
  </div>

  <div class="control-bar">
    <button onclick="restart()">📸 NUEVA</button>
    <button onclick="resetGame()">🔄 REINICIAR</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
